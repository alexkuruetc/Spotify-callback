<!DOCTYPE html>
<html>
<head><title>Spotify Auth</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family:monospace;padding:30px;background:#0d0d0d;color:#e8e8e8;">
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const error = params.get("error");
  const state = params.get("state");

  if (error) {
    document.write('<p style="color:#ff5555">✗ Spotify declined: ' + error + '</p>');
  } else if (code && state) {
    // State contains the return URL encoded in it after a pipe character
    const pipeIdx = state.lastIndexOf("|");
    const returnUrl = pipeIdx > -1 ? atob(state.slice(pipeIdx + 1)) : null;
    if (returnUrl) {
      const redirect = returnUrl + "?spotifycallback=1&code=" + encodeURIComponent(code) + "&state=" + encodeURIComponent(state);
      window.location.replace(redirect);
    } else {
      document.write('<p style="color:#ff5555">No return URL found. Please go back and try again.</p>');
    }
  } else {
    document.write('<p>No code found. Please go back and try again.</p>');
  }
</script>
</body>
</html>
