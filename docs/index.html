<!DOCTYPE html>
<html>
<head><title>Spotify Auth</title></head>
<body>
<p style="font-family:monospace;padding:20px">Connecting... returning to Claude.</p>
<script>
  const params = window.location.search;
  const returnTo = sessionStorage.getItem("spotify_return_url");
  if (returnTo) {
    window.location.replace(returnTo + "?spotifycallback=1" + "&" + params.slice(1));
  } else {
    document.querySelector("p").textContent = "Error: no return URL found. Please go back to Claude and try again.";
  }
</script>
</body>
</html>
