<!DOCTYPE html>
<html>
<head><title>Spotify Auth</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family:monospace;padding:30px;background:#0d0d0d;color:#e8e8e8;">
<p>Connecting...</p>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const state = params.get("state");
  const error = params.get("error");

  if (error) {
    document.querySelector("p").style.color = "#ff5555";
    document.querySelector("p").textContent = "✗ Spotify declined: " + error;
  } else if (code) {
    const redirect = "https://alexkuruetc.github.io/Spotify-callback/discovery.html"
      + "?spotifycallback=1"
      + "&code=" + encodeURIComponent(code)
      + "&state=" + encodeURIComponent(state || "");
    window.location.replace(redirect);
  } else {
    document.querySelector("p").textContent = "No code found. Please go back and try again.";
  }
</script>
</body>
</html>
